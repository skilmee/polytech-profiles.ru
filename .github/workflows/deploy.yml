name: Deploy static site to server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "./*"
          target: "/var/www/mysite"
          rm: true

      - name: Fix permissions and reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            sudo chown -R deploy:www-data /var/www/mysite
            sudo find /var/www/mysite -type d -exec chmod 775 {} \;
            sudo find /var/www/mysite -type f -exec chmod 664 {} \;
            sudo nginx -t
            sudo systemctl reload nginx
